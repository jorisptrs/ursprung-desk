<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>the desk — add your work</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="desk.css">
</head>
<body class="deposit-body">
  <script type="module">
    // The QR target (D79): the same sheet, standing alone. Which desk it lays
    // onto is decided by which desk served it. Served by the room, the push
    // goes to the room's log — the everyday door, made real. Served by the
    // published renderer, which has no backend and never will, a push reaches
    // a table tab in this same browser and nothing leaves the device.
    //
    // One code for the whole room (keeper's ruling 2026-07-23): everyone scans
    // the same one, taps their own name once, and this device remembers. A
    // laptop claims the same way and is then shown its own line for a Claude
    // session — one flow, both doors.
    import { openSheet, claimGate, broadcastSink, httpSink } from './js/deposit.js';

    const KEY = 'desk-room-token';
    const read = () => { try { return localStorage.getItem(KEY); } catch { return null; } };
    const keep = (t) => { try { localStorage.setItem(KEY, t); } catch { /* private mode: this session only */ } };

    let token = new URLSearchParams(location.search).get('t') ?? read();
    if (token) keep(token);

    const ask = (path, init) => fetch(`${location.origin}${path}`, {
      ...init,
      headers: { ...(init?.headers ?? {}), ...(token ? { 'x-desk-token': token } : {}) },
      cache: 'no-store',
    });

    let me = null;
    let people = [];
    let room = false;
    try {
      const res = await ask('/whoami');
      if (res.ok) { room = true; ({ name: me, people } = await res.json()); }
    } catch { /* not the room's server: the published page, or it is not answering */ }

    // The two ways to be someone at this desk, used by the name page below.
    const claimFn = async (name) => {
      const res = await ask('/claim', {
        method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ name }),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.refused ?? 'the desk did not take that');
      return body; // { token, name }
    };
    const renameFn = async (name) => {
      const res = await ask('/rename', {
        method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ name }),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.refused ?? 'the desk did not take that');
      try { people = (await (await ask('/whoami')).json()).people ?? people; } catch { /* keep the list we have */ }
      return body.name;
    };

    // The name page: a device the room does not know yet meets the cohort first;
    // a known device reaches the SAME page from the sheet (?manage) to become
    // someone else or be called something new — one page, both doors.
    const manage = new URLSearchParams(location.search).has('manage');
    if (room && (!me || manage)) {
      const got = await claimGate({
        people, token,
        me: manage ? me : null,
        onClaim: claimFn,
        onRename: (manage && me) ? renameFn : null,
      });
      token = got.token; me = got.name; keep(token);
      if (manage) history.replaceState(null, '', location.pathname); // drop ?manage so a reload does not re-open it
    }

    // From the sheet, tapping your name comes back here — the token is kept, so
    // the page knows who you are and can rename as well as switch.
    const onSwitchName = room ? () => {
      location.href = location.origin + location.pathname + '?manage';
    } : null;

    // The "builds on…" picker's stock: this device's own cards, asked of the room
    // each time it opens so a card just laid is already there to follow. Only the
    // room knows them; the published page has no such door, so the picker hides.
    const myCards = room && token
      ? async () => {
          try {
            const res = await ask('/mine');
            return res.ok ? ((await res.json()).cards ?? []) : [];
          } catch { return []; }
        }
      : null;

    const sink = token ? httpSink(location.origin, token) : broadcastSink();
    openSheet({ mode: 'page', container: document.body, sink, me, people, onSwitchName, myCards });

    // A laptop that has claimed is shown its own line, once, below the sheet —
    // the MCP door, for a Claude session on this machine. It is meaningless on a
    // phone (nothing there to paste it into), so it appears only where a pointer
    // can hover — a laptop or desktop — and never on the touch device that only
    // ever wants the hand door above (D179).
    if (room && token && matchMedia('(hover: hover)').matches) {
      const line = document.createElement('div');
      line.className = 'sheet__mcpline';
      line.textContent = `claude mcp add desk --transport http ${location.origin}/mcp/${token}`;
      document.body.append(line);
    }
  </script>
</body>
</html>
